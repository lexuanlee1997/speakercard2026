<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Generator</title>

<style>
body {
  font-family: Arial;
  background:#232D45;
  color:white;
  padding:40px;
}

.container {
  max-width:600px;
  margin:auto;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  background:#1b2235;
  color:white;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:14px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.output {
  margin-top:20px;
  background:#1b2235;
  padding:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="container">

<h2>Speaker Generator</h2>

<input id="name" placeholder="Full Name">
<input id="job" placeholder="Job Title">
<input id="company" placeholder="Company">

<input id="photo" placeholder="Speaker Photo URL">
<input id="logo" placeholder="Corporate Logo URL (optional)">

<textarea id="caption" placeholder="LinkedIn Caption"></textarea>

<hr>

<h4>LinkedIn Profiles (Optional - up to 5)</h4>

<input id="li1_name" placeholder="Name 1">
<input id="li1_url" placeholder="LinkedIn URL 1">

<input id="li2_name" placeholder="Name 2">
<input id="li2_url" placeholder="LinkedIn URL 2">

<input id="li3_name" placeholder="Name 3">
<input id="li3_url" placeholder="LinkedIn URL 3">

<input id="li4_name" placeholder="Name 4">
<input id="li4_url" placeholder="LinkedIn URL 4">

<input id="li5_name" placeholder="Name 5">
<input id="li5_url" placeholder="LinkedIn URL 5">

<button onclick="generate()">Generate Link</button>

<div class="output" id="output"></div>

</div>

<script>
function generate(){

  const name = document.getElementById('name').value.trim();
  const job = document.getElementById('job').value.trim();
  const company = document.getElementById('company').value.trim();
  const photo = document.getElementById('photo').value.trim();
  const logo = document.getElementById('logo').value.trim();
  const caption = document.getElementById('caption').value.trim();

  if(!name || !job || !company || !photo){
    alert("Fill required fields");
    return;
  }

  const title = job + " · " + company;
  const base = window.location.href.replace("admin.html","index.html");

  const params = new URLSearchParams();

  params.set("name", name);
  params.set("title", title);
  params.set("photo", photo);

  if(logo) params.set("logo", logo);
  if(caption) params.set("caption", caption);

  // LinkedIn entries
  for(let i=1;i<=5;i++){
    const n = document.getElementById(`li${i}_name`).value.trim();
    const u = document.getElementById(`li${i}_url`).value.trim();

    if(n && u){
      params.append("li_name", n);
      params.append("li_url", u);
    }
  }

  document.getElementById('output').textContent = base + "?" + params.toString();
}
</script>

</body>
</html>
