<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Generator</title>

<style>
body {
  font-family:Arial;
  background:#232D45;
  color:white;
  padding:40px;
}

.container {
  max-width:600px;
  margin:auto;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:none;
  background:#1b2235;
  color:white;
}

button {
  width:100%;
  padding:14px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.output {
  margin-top:20px;
  background:#1b2235;
  padding:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="container">

<h2>Speaker Generator</h2>

<input id="name" placeholder="Full Name">
<input id="job" placeholder="Job Title">
<input id="company" placeholder="Company">

<input id="photo" placeholder="Speaker Photo URL">
<input id="logo" placeholder="Corporate Logo URL (optional)">

<textarea id="caption" placeholder="LinkedIn Caption"></textarea>
<input id="tags" placeholder="Tags (use | e.g. Future Fit Asia|John Doe|Jane Doe)">

<button onclick="generate()">Generate Link</button>

<div class="output" id="output"></div>

</div>

<script>
function generate(){

  const name = document.getElementById('name').value.trim();
  const job = document.getElementById('job').value.trim();
  const company = document.getElementById('company').value.trim();
  const photo = document.getElementById('photo').value.trim();
  const logo = document.getElementById('logo').value.trim();
  const caption = document.getElementById('caption').value.trim();
  const tags = document.getElementById('tags').value.trim();

  if(!name || !job || !company || !photo){
    alert("Fill required fields");
    return;
  }

  const title = job + " · " + company;
  const base = window.location.href.replace("admin.html","index.html");

  const params = new URLSearchParams();
  params.set("name", name);
  params.set("title", title);
  params.set("photo", photo);

  if(logo) params.set("corplogo", logo);
  if(caption) params.set("caption", caption);
  if(tags) params.set("tags", tags);

  document.getElementById('output').textContent = base + "?" + params.toString();
}
</script>

</body>
</html>
