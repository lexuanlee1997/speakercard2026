<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFA2026 — Speaker Link Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family:'DM Sans', sans-serif;
  background:#232D45;
  color:white;
  display:flex;
  justify-content:center;
  padding:40px;
}

.container {
  width:100%;
  max-width:600px;
}

h1 {
  font-family:'Bebas Neue', sans-serif;
  letter-spacing:0.08em;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:none;
  background:#1b2235;
  color:white;
}

button {
  width:100%;
  padding:14px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.preview {
  margin-top:10px;
}

.preview img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.output {
  margin-top:20px;
  word-break:break-all;
  background:#1b2235;
  padding:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>SPEAKER LINK GENERATOR</h1>

<input id="name" placeholder="Full Name">

<div style="display:flex; gap:10px;">
  <input id="job" placeholder="Job Title">
  <input id="company" placeholder="Company">
</div>

<input id="photo" placeholder="Speaker Photo URL" oninput="previewPhoto()">
<div class="preview"><img id="photoPreview"></div>

<input id="logo" placeholder="Corporate Logo URL (optional)">

<textarea id="caption" placeholder="LinkedIn caption (optional)"></textarea>

<button onclick="generate()">Generate Link</button>

<div class="output" id="output"></div>

</div>

<script>

function previewPhoto(){
  document.getElementById('photoPreview').src =
    document.getElementById('photo').value;
}

function generate(){

  const name = document.getElementById('name').value.trim();
  const job = document.getElementById('job').value.trim();
  const company = document.getElementById('company').value.trim();
  const photo = document.getElementById('photo').value.trim();
  const logo = document.getElementById('logo').value.trim();
  const caption = document.getElementById('caption').value.trim();

  if(!name || !job || !company || !photo){
    alert("Fill all required fields");
    return;
  }

  const title = job + " · " + company;

  const base = window.location.href.replace("admin.html","index.html");

  const params = new URLSearchParams();
  params.set("name", name);
  params.set("title", title);
  params.set("photo", photo);

  if(logo) params.set("corplogo", logo);
  if(caption) params.set("caption", caption);

  const link = base + "?" + params.toString();

  document.getElementById('output').textContent = link;
}

</script>

</body>
</html>
