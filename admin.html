<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Generator</title>

<style>
body {
  font-family: Arial;
  background:#232D45;
  color:white;
  padding:40px;
}

.container {
  max-width:600px;
  margin:auto;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  background:#1b2235;
  color:white;
  box-sizing:border-box;
}

.row {
  display:flex;
  gap:10px;
}

.row input {
  width:50%;
}

button {
  width:100%;
  padding:14px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.output {
  margin-top:20px;
  background:#1b2235;
  padding:10px;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="container">

<h2>Speaker Generator</h2>

<input id="name" placeholder="Full Name">
<input id="job" placeholder="Job Title">
<input id="company" placeholder="Company">

<input id="photo" placeholder="Speaker Photo URL">
<input id="logo" placeholder="Corporate Logo URL (optional)">

<textarea id="caption" placeholder="LinkedIn Caption"></textarea>

<h4>LinkedIn Profiles (optional)</h4>

<div class="row"><input id="n1"><input id="u1"></div>
<div class="row"><input id="n2"><input id="u2"></div>
<div class="row"><input id="n3"><input id="u3"></div>
<div class="row"><input id="n4"><input id="u4"></div>
<div class="row"><input id="n5"><input id="u5"></div>

<button onclick="generate()">Generate Link</button>

<div class="output" id="output"></div>

</div>

<script>
function generate(){

  const data = {
    name: document.getElementById('name').value.trim(),
    job: document.getElementById('job').value.trim(),
    company: document.getElementById('company').value.trim(),
    photo: document.getElementById('photo').value.trim(),
    logo: document.getElementById('logo').value.trim(),
    caption: document.getElementById('caption').value.trim(),
    links: []
  };

  if(!data.name || !data.job || !data.company || !data.photo){
    alert("Fill required fields");
    return;
  }

  for(let i=1;i<=5;i++){
    const n = document.getElementById('n'+i).value.trim();
    const u = document.getElementById('u'+i).value.trim();
    if(n && u){
      data.links.push({name:n, url:u});
    }
  }

  const base = window.location.href.replace("admin.html","index.html");
  const encoded = encodeURIComponent(JSON.stringify(data));

  document.getElementById('output').textContent =
    base + "?data=" + encoded;
}
</script>

</body>
</html>
