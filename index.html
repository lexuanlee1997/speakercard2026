<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFA2026 Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'DM Sans', sans-serif;
}

/* ===== CARD ===== */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
  overflow:hidden;
}

/* BACKDROP */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* ===== PHOTO (CENTER FRAME) ===== */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  
  width:330px;
  height:330px;

  overflow:hidden;
  z-index:2;

  /* FRAME */
  border: 2px solid rgba(255,255,255,0.7);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.15) inset;
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

/* ===== TEXT BLOCK ===== */
.text-block {
  position:absolute;
  bottom:70px; /* moved lower */
  left:140px;

  display:flex;
  align-items:center;
  gap:16px;

  z-index:3;
}

/* LOGO */
.logo {
  width:70px;
  height:45px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo img {
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* NAME + TITLE */
.text-content {
  display:flex;
  flex-direction:column;
}

/* NAME */
.name {
  font-family:'Bebas Neue', sans-serif;
  font-size:34px;
  letter-spacing:0.04em;
  color:white;
  line-height:1;
}

/* TITLE */
.title {
  margin-top:6px;
  font-size:11px;
  color:#77AEB6;
  text-transform:uppercase;
  letter-spacing:0.08em;
  line-height:1.4;
}

/* DOWNLOAD BUTTON */
button {
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="speaker-card">

  <!-- BACKDROP -->
  <img class="card-bg"
       src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png"
       crossorigin="anonymous">

  <!-- PHOTO -->
  <div class="photo-frame">
    <img id="photo">
  </div>

  <!-- TEXT + LOGO -->
  <div class="text-block">

    <!-- LOGO -->
    <div class="logo" id="logo-box" style="display:none;">
      <img id="logo">
    </div>

    <!-- NAME + TITLE -->
    <div class="text-content">
      <div class="name" id="name"></div>
      <div class="title" id="title"></div>
    </div>

  </div>

</div>

<button onclick="download()">Download</button>

<script>
function getParam(k){
  return decodeURIComponent(new URLSearchParams(window.location.search).get(k)||'');
}

const name = getParam('name');
const title = getParam('title');
const photo = getParam('photo');
const logo = getParam('corplogo');

if(name) document.getElementById('name').textContent = name;
if(title) document.getElementById('title').textContent = title;

if(photo){
  document.getElementById('photo').src = photo;
}

if(logo){
  document.getElementById('logo').src = logo;
  document.getElementById('logo-box').style.display = 'flex';
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });
  const link = document.createElement('a');
  link.download = (name || 'speaker') + '.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
