<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'DM Sans';
}

/* CARD */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
}

/* BG */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.7);
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.text-block {
  position:absolute;
  bottom:20px;
  left:150px;
}

.name {
  font-family:'Bebas Neue';
  font-size:40px;
  color:white;
}

.title {
  font-size:13px;
  color:#77AEB6;
}

/* UI */
.box {
  width:600px;
  background:#1b2235;
  padding:16px;
  margin-top:20px;
}

textarea {
  width:100%;
  height:140px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
}

button {
  width:600px;
  padding:12px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="speaker-card">
  <img class="card-bg"
       src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png"
       crossorigin="anonymous">

  <div class="photo-frame">
    <img id="photo" crossorigin="anonymous">
  </div>

  <div class="text-block">
    <div class="name" id="name"></div>
    <div class="title" id="title"></div>
  </div>
</div>

<button onclick="download()">Download Image</button>

<!-- TAGS -->
<div class="box">
  <b>Tag these:</b>
  <ul id="tags"></ul>
</div>

<!-- CAPTION -->
<div class="box">
  <textarea id="caption" readonly></textarea>
</div>

<button onclick="copy()">Copy Caption</button>
<button onclick="copyAndOpen()">Copy + Open LinkedIn</button>

<script>
function getParam(k){
  return new URLSearchParams(window.location.search).get(k) || '';
}

/* LOAD DATA */
window.onload = () => {

  const name = getParam('name');
  const title = getParam('title');
  const photo = getParam('photo');
  const caption = getParam('caption');
  const tags = getParam('tags');

  if(name) document.getElementById('name').textContent = name;
  if(title) document.getElementById('title').textContent = title;
  if(photo) document.getElementById('photo').src = photo;
  if(caption) document.getElementById('caption').value = caption;

  if(tags){
    const list = tags.split("|");
    const ul = document.getElementById('tags');
    list.forEach(t => {
      const li = document.createElement('li');
      li.textContent = "@" + t;
      ul.appendChild(li);
    });
  }
}

/* COPY */
function copy(){
  const text = document.getElementById('caption').value;
  navigator.clipboard.writeText(text)
    .then(()=> alert("Copied"))
    .catch(()=> alert("Copy failed"));
}

/* COPY + OPEN */
function copyAndOpen(){
  const text = document.getElementById('caption').value;
  navigator.clipboard.writeText(text);
  window.open("https://www.linkedin.com/feed/?shareActive=true","_blank");
}

/* DOWNLOAD */
async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });

  const link = document.createElement('a');
  link.download = "speaker.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
