<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFA2026 Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'DM Sans', sans-serif;
}

/* CARD */
#speaker-card {
  width:600px;
  height:600px;
  position:relative;
  overflow:hidden;
}

/* BACKGROUND */
.card-bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo-frame {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.75);
  box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

.photo-frame img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT BLOCK */
.text-block {
  position:absolute;
  bottom:20px;
  left:140px;
  display:flex;
  align-items:center;
  gap:16px;
  transform: translateX(10px);
}

/* LOGO */
.logo {
  width:70px;
  height:45px;
  display:flex;
  align-items:center;
}

.logo img {
  max-width:100%;
  max-height:100%;
}

/* TEXT */
.name {
  font-family:'Bebas Neue';
  font-size:40px;
  color:white;
}

.title {
  font-size:13px;
  color:#77AEB6;
  text-transform:uppercase;
}

/* CAPTION BOX */
.caption-box {
  width:600px;
  background:#1b2235;
  padding:16px;
  margin-top:20px;
}

.caption-box textarea {
  width:100%;
  height:140px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="speaker-card">

<img class="card-bg"
src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png"
crossorigin="anonymous">

<div class="photo-frame">
<img id="photo">
</div>

<div class="text-block">

<div class="logo" id="logo-box" style="display:none;">
<img id="logo">
</div>

<div>
<div class="name" id="name"></div>
<div class="title" id="title"></div>
</div>

</div>

</div>

<button onclick="download()">Download Image</button>

<!-- CAPTION -->
<div class="caption-box">
  <textarea id="captionText" readonly></textarea>
  <button onclick="copyCaption()">Copy LinkedIn Caption</button>
  <p style="font-size:12px;opacity:0.7;">
    Tip: After pasting, type @ to tag people/companies on LinkedIn.
  </p>
</div>

<script>
function getParam(k){
  return decodeURIComponent(new URLSearchParams(window.location.search).get(k)||'');
}

const name = getParam('name');
const title = getParam('title');
const photo = getParam('photo');
const logo = getParam('corplogo');
const caption = getParam('caption');

if(name) document.getElementById('name').textContent = name;
if(title) document.getElementById('title').textContent = title;
if(photo) document.getElementById('photo').src = photo;

if(logo){
  document.getElementById('logo').src = logo;
  document.getElementById('logo-box').style.display = 'flex';
}

if(caption){
  document.getElementById('captionText').value = caption;
}

function copyCaption(){
  const text = document.getElementById('captionText');
  text.select();
  document.execCommand("copy");
  alert("Copied! Paste on LinkedIn.");
}

async function download(){
  const canvas = await html2canvas(document.getElementById('speaker-card'), {
    scale:2,
    useCORS:true
  });
  const link = document.createElement('a');
  link.download = (name || 'speaker') + '.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
