<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:30px;
  padding:40px;
  font-family:'DM Sans';
}

/* CARD */
#card {
  width:600px;
  height:600px;
  position:relative;
  overflow: hidden;
}

.bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
}

.photo img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT & LOGO LAYOUT */
.text {
  position:absolute;
  bottom:30px;
  left:150px;
  display: flex;
  align-items: center; 
  gap: 15px;
}

.details {
  display: flex;
  flex-direction: column;
}

.name {
  font-size:40px;
  font-family:'Bebas Neue';
  color:white;
  line-height: 1;
}

.title {
  font-size:13px;
  color:#77AEB6;
  margin-top: 4px;
}

.logo {
  width:60px; 
  flex-shrink: 0;
}

.logo img {
  width:100%;
  height: auto;
  display: block;
}

/* SIDE PANEL */
.panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.box {
  background:#1b2235;
  padding:16px;
  color:white;
}

.tag-reminder {
  font-size: 11px; 
  color: #77AEB6; 
  margin-top: -5px; 
  margin-bottom: 15px; 
  font-style: italic;
  line-height: 1.4;
}

.link-item {
  display:block;
  margin-bottom:12px;
  text-decoration:none;
}

.link-name {
  color:#DEFF4C;
  display: block;
  font-weight: bold;
}

.link-url {
  color: #77AEB6;
  font-size: 11px;
  display: block;
  word-break: break-all;
}

textarea {
  width:100%;
  height:160px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
  box-sizing:border-box;
  font-family:'DM Sans';
  font-size: 13px;
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div id="card">
    <img class="bg" src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png">

    <div class="photo">
        <img id="photo">
    </div>

    <div class="text">
        <div class="logo" id="logoBox" style="display:none;">
            <img id="logoImg">
        </div>
        <div class="details">
            <div class="name" id="name"></div>
            <div class="title" id="title"></div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="box">
        <h3 style="margin-top:0; margin-bottom:8px;">LinkedIn Profiles</h3>
        <p class="tag-reminder">
            Please ensure all handles are accurately tagged to maximize post engagement and reach.
        </p>
        <div id="links"></div>
    </div>

    <div class="box">
        <textarea id="caption" readonly></textarea>
    </div>

    <button onclick="copy()">Copy Caption</button>
    <button onclick="openLI()">Copy + Open LinkedIn</button>
    <button onclick="download()">Download Image</button>
</div>

<script>
function getData(){
    const raw = new URLSearchParams(window.location.search).get("data");
    return raw ? JSON.parse(decodeURIComponent(raw)) : null;
}

window.onload = () => {
    const d = getData();
    if(!d) return;

    document.getElementById('name').textContent = d.name;
    document.getElementById('title').textContent = d.job + " · " + d.company;
    document.getElementById('photo').src = d.photo;
    document.getElementById('caption').value = d.caption;

    if(d.logo){
        document.getElementById('logoImg').src = d.logo;
        document.getElementById('logoBox').style.display = "block";
    }

    const box = document.getElementById('links');
    d.links.forEach(l => {
        const container = document.createElement('a');
        container.href = l.url;
        container.target = "_blank";
        container.className = "link-item";
        
        container.innerHTML = `
            <span class="link-name">${l.name}</span>
            <span class="link-url">${l.url}</span>
        `;
        box.appendChild(container);
    });
}

function copy(){
    navigator.clipboard.writeText(document.getElementById('caption').value);
}

function openLI(){
    navigator.clipboard.writeText(document.getElementById('caption').value);
    window.open("https://www.linkedin.com/feed/", "_blank");
}

async function download(){
    const card = document.getElementById('card');
    const canvas = await html2canvas(card, {
        scale: 2,
        useCORS: true,
        backgroundColor: null
    });

    const link = document.createElement('a');
    link.download = `Speaker-${document.getElementById('name').textContent}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
