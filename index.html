<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0d0a;
    --cream: #faf7f2;
    --gold: #c9a84c;
    --gold-light: #e8d48a;
    --warm-gray: #8a8278;
    --card-bg: #1a1612;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    color: var(--ink);
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
  }
  h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .subtitle {
    margin-top: 12px;
    font-size: 15px;
    color: var(--warm-gray);
    font-weight: 300;
  }

  /* Layout */
  .workspace {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Form Panel */
  .panel {
    background: white;
    border-radius: 2px;
    padding: 36px;
    width: 360px;
    flex-shrink: 0;
    box-shadow: 0 2px 24px rgba(15,13,10,0.06);
    border: 1px solid rgba(201,168,76,0.15);
  }
  .panel-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .field {
    margin-bottom: 22px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--warm-gray);
    font-weight: 500;
    margin-bottom: 8px;
  }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e8e4de;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s;
    outline: none;
    resize: none;
  }
  input:focus, textarea:focus {
    border-color: var(--gold);
    background: white;
  }
  input::placeholder, textarea::placeholder {
    color: #c5bfb8;
  }
  textarea { height: 90px; line-height: 1.5; }

  /* Theme selector */
  .theme-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .theme-btn {
    flex: 1;
    padding: 10px 6px;
    border: 2px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .theme-btn.dark  { background: #1a1612; color: #c9a84c; }
  .theme-btn.light { background: #faf7f2; color: #1a1612; border-color: #e8e4de; }
  .theme-btn.navy  { background: #0d1b2a; color: #7eb8d4; }
  .theme-btn.active { border-color: var(--gold) !important; transform: scale(0.97); }

  /* Download button */
  .download-btn {
    width: 100%;
    margin-top: 28px;
    padding: 15px;
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .download-btn:hover { background: #2d2820; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,13,10,0.2); }
  .download-btn:active { transform: translateY(0); }
  .download-btn svg { flex-shrink: 0; }

  /* Card Preview Area */
  .preview-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .preview-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm-gray);
    font-weight: 500;
    align-self: flex-start;
  }

  /* ─── THE SPEAKER CARD ─── */
  #speaker-card {
    width: 600px;
    height: 600px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    border-radius: 3px;
    transition: all 0.3s ease;
  }

  /* DARK theme (default) */
  #speaker-card.theme-dark {
    background: #1a1612;
  }
  #speaker-card.theme-dark .card-bg-accent {
    background: conic-gradient(from 200deg at 80% 20%, #c9a84c22 0deg, transparent 60deg, transparent 300deg, #c9a84c11 360deg);
  }
  #speaker-card.theme-dark .card-corner-line { border-color: #c9a84c55; }
  #speaker-card.theme-dark .card-eyebrow { color: #c9a84c; }
  #speaker-card.theme-dark .card-name { color: #faf7f2; }
  #speaker-card.theme-dark .card-title { color: #8a8278; }
  #speaker-card.theme-dark .card-divider { background: #c9a84c44; }
  #speaker-card.theme-dark .card-quote { color: #d4cfc8; }
  #speaker-card.theme-dark .card-quote-mark { color: #c9a84c; }
  #speaker-card.theme-dark .card-event { color: #c9a84c; }
  #speaker-card.theme-dark .card-event-name { color: #faf7f280; }

  /* LIGHT theme */
  #speaker-card.theme-light {
    background: #faf7f2;
    border: 1px solid #e8e4de;
  }
  #speaker-card.theme-light .card-bg-accent {
    background: conic-gradient(from 200deg at 80% 20%, #c9a84c18 0deg, transparent 60deg);
  }
  #speaker-card.theme-light .card-corner-line { border-color: #c9a84c44; }
  #speaker-card.theme-light .card-eyebrow { color: #c9a84c; }
  #speaker-card.theme-light .card-name { color: #0f0d0a; }
  #speaker-card.theme-light .card-title { color: #8a8278; }
  #speaker-card.theme-light .card-divider { background: #c9a84c66; }
  #speaker-card.theme-light .card-quote { color: #3a352e; }
  #speaker-card.theme-light .card-quote-mark { color: #c9a84c; }
  #speaker-card.theme-light .card-event { color: #c9a84c; }
  #speaker-card.theme-light .card-event-name { color: #0f0d0a99; }

  /* NAVY theme */
  #speaker-card.theme-navy {
    background: #0d1b2a;
  }
  #speaker-card.theme-navy .card-bg-accent {
    background: conic-gradient(from 200deg at 80% 20%, #7eb8d422 0deg, transparent 60deg, transparent 300deg, #7eb8d411 360deg);
  }
  #speaker-card.theme-navy .card-corner-line { border-color: #7eb8d455; }
  #speaker-card.theme-navy .card-eyebrow { color: #7eb8d4; }
  #speaker-card.theme-navy .card-name { color: #e8f4f8; }
  #speaker-card.theme-navy .card-title { color: #5a8fa8; }
  #speaker-card.theme-navy .card-divider { background: #7eb8d444; }
  #speaker-card.theme-navy .card-quote { color: #b8d8e8; }
  #speaker-card.theme-navy .card-quote-mark { color: #7eb8d4; }
  #speaker-card.theme-navy .card-event { color: #7eb8d4; }
  #speaker-card.theme-navy .card-event-name { color: #e8f4f880; }

  /* Card internals */
  .card-bg-accent {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .card-corner-line {
    position: absolute;
    width: 60px;
    height: 60px;
    border-style: solid;
    border-width: 0;
    pointer-events: none;
  }
  .card-corner-line.tl { top: 28px; left: 28px; border-top-width: 1px; border-left-width: 1px; }
  .card-corner-line.tr { top: 28px; right: 28px; border-top-width: 1px; border-right-width: 1px; }
  .card-corner-line.bl { bottom: 28px; left: 28px; border-bottom-width: 1px; border-left-width: 1px; }
  .card-corner-line.br { bottom: 28px; right: 28px; border-bottom-width: 1px; border-right-width: 1px; }

  .card-inner {
    position: relative;
    z-index: 2;
    padding: 54px 58px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .card-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 700;
    line-height: 1.05;
    margin-bottom: 10px;
    word-break: break-word;
  }

  .card-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.04em;
    margin-bottom: 32px;
    word-break: break-word;
  }

  .card-divider {
    width: 48px;
    height: 1.5px;
    margin-bottom: 28px;
    flex-shrink: 0;
  }

  .card-quote-wrap {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .card-quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    line-height: 0.8;
    flex-shrink: 0;
    margin-top: -4px;
  }
  .card-quote {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-style: italic;
    line-height: 1.6;
    word-break: break-word;
  }

  .card-footer {
    position: absolute;
    bottom: 52px;
    left: 58px;
    right: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
  }
  .card-event {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .card-event-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  /* hint text below preview */
  .preview-hint {
    font-size: 12px;
    color: var(--warm-gray);
    letter-spacing: 0.05em;
  }

  @media (max-width: 680px) {
    #speaker-card { width: 340px; height: 340px; }
    .card-inner { padding: 32px 34px; }
    .card-name { font-size: 26px; }
    .card-title { font-size: 12px; margin-bottom: 20px; }
    .card-quote { font-size: 13px; }
    .card-quote-mark { font-size: 36px; }
    .card-footer { bottom: 28px; left: 34px; right: 34px; }
    .card-corner-line { width: 40px; height: 40px; top: 18px; left: 18px; }
    .card-corner-line.tr { top: 18px; right: 18px; }
    .card-corner-line.bl { bottom: 18px; left: 18px; }
    .card-corner-line.br { bottom: 18px; right: 18px; }
    .panel { width: 340px; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Speaker Materials</p>
  <h1>Your <em>Card,</em><br>Your Stage.</h1>
  <p class="subtitle">Fill in your details, add a quote, download as PNG.</p>
</header>

<div class="workspace">

  <!-- Form -->
  <div class="panel">
    <p class="panel-title">Card Details</p>

    <div class="field">
      <label>Full Name</label>
      <input id="inp-name" type="text" placeholder="e.g. Sarah Chen" maxlength="40">
    </div>

    <div class="field">
      <label>Title / Role</label>
      <input id="inp-title" type="text" placeholder="e.g. CEO · Anthropic" maxlength="60">
    </div>

    <div class="field">
      <label>Your Quote <span style="color:#c5bfb8;font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea id="inp-quote" placeholder="Share a thought that represents your talk…" maxlength="160"></textarea>
    </div>

    <div class="field">
      <label>Event Name <span style="color:#c5bfb8;font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input id="inp-event" type="text" placeholder="e.g. TEDxSingapore 2025" maxlength="50">
    </div>

    <div class="field">
      <label>Card Style</label>
      <div class="theme-row">
        <button class="theme-btn dark active" data-theme="dark">Dark</button>
        <button class="theme-btn light" data-theme="light">Light</button>
        <button class="theme-btn navy" data-theme="navy">Navy</button>
      </div>
    </div>

    <button class="download-btn" id="download-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PNG
    </button>
  </div>

  <!-- Preview -->
  <div class="preview-area">
    <p class="preview-label">Live Preview</p>

    <div id="speaker-card" class="theme-dark">
      <div class="card-bg-accent"></div>
      <div class="card-corner-line tl"></div>
      <div class="card-corner-line tr"></div>
      <div class="card-corner-line bl"></div>
      <div class="card-corner-line br"></div>

      <div class="card-inner">
        <p class="card-eyebrow">Speaker</p>
        <h2 class="card-name" id="card-name">Your Name</h2>
        <p class="card-title" id="card-title">Title · Organization</p>
        <div class="card-divider"></div>
        <div class="card-quote-wrap" id="quote-block">
          <span class="card-quote-mark">"</span>
          <p class="card-quote" id="card-quote">Add a memorable quote from your talk here.</p>
        </div>
      </div>

      <div class="card-footer">
        <span class="card-event" id="card-event-label">Speaking at</span>
        <span class="card-event-name" id="card-event-name">Your Event</span>
      </div>
    </div>

    <p class="preview-hint">1:1 square format · ideal for Instagram, LinkedIn &amp; Twitter</p>
  </div>

</div>

<script>
  const card = document.getElementById('speaker-card');

  // Live field updates
  function bindInput(inputId, cardId, fallback) {
    const input = document.getElementById(inputId);
    const target = document.getElementById(cardId);
    input.addEventListener('input', () => {
      target.textContent = input.value.trim() || fallback;
    });
  }

  bindInput('inp-name',  'card-name',  'Your Name');
  bindInput('inp-title', 'card-title', 'Title · Organization');
  bindInput('inp-quote', 'card-quote', 'Add a memorable quote from your talk here.');
  bindInput('inp-event', 'card-event-name', 'Your Event');

  // Theme switching
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      card.className = 'theme-' + btn.dataset.theme;
    });
  });

  // Download
  document.getElementById('download-btn').addEventListener('click', async () => {
    const btn = document.getElementById('download-btn');
    btn.textContent = 'Generating…';
    btn.disabled = true;

    try {
      const canvas = await html2canvas(card, {
        scale: 2,           // 2× = 1200×1200px output
        useCORS: true,
        logging: false,
        backgroundColor: null
      });

      const link = document.createElement('a');
      const name = document.getElementById('inp-name').value.trim().replace(/\s+/g, '-') || 'speaker';
      link.download = `${name}-speaker-card.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {
      alert('Something went wrong. Please try again.');
    }

    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PNG`;
    btn.disabled = false;
  });
</script>
</body>
</html>
