<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaker Card</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  background:#232D45;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:30px;
  padding:40px;
  font-family:'DM Sans';
}

/* CARD */
#card {
  width:600px;
  height:600px;
  position:relative;
  overflow: hidden;
}

.bg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* PHOTO */
.photo {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -42%);
  width:330px;
  height:330px;
  overflow:hidden;
}

.photo img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT & LOGO LAYOUT */
.text {
  position:absolute;
  bottom:30px;
  left:150px;
  display: flex;
  align-items: center; 
  gap: 15px;
}

.details {
  display: flex;
  flex-direction: column;
}

.name {
  font-size:40px;
  font-family:'Bebas Neue';
  color:white;
  line-height: 1;
}

.title {
  font-size:13px;
  color:#77AEB6;
  margin-top: 4px;
}

/* THE SUBTLE PILL CONTAINER */
.logo {
  background: white;
  padding: 8px 12px;
  border-radius: 50px; /* Pill shape */
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  width: 70px; /* Specific width to maintain "premium badge" look */
  height: 40px;
  flex-shrink: 0;
}

.logo img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* SIDE PANEL */
.panel {
  width:320px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.box {
  background:#1b2235;
  padding:16px;
  color:white;
}

.tag-reminder {
  font-size: 11px; 
  color: #77AEB6; 
  margin-top: -5px; 
  margin-bottom: 15px; 
  font-style: italic;
  line-height: 1.4;
}

.link-item {
  display:block;
  margin-bottom:12px;
  text-decoration:none;
}

.link-name {
  color:#DEFF4C;
  display: block;
  font-weight: bold;
}

.link-url {
  color: #77AEB6;
  font-size: 11px;
  display: block;
  word-break: break-all;
}

textarea {
  width:100%;
  height:160px;
  background:#11182a;
  color:white;
  border:none;
  padding:10px;
  box-sizing:border-box;
  font-family:'DM Sans';
  font-size: 13px;
}

button {
  width:100%;
  padding:12px;
  background:#DEFF4C;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div id="card">
    <img class="bg" src="https://futurefitasia.com/wp-content/uploads/2026/04/FFA2026-Promotion-Speaker-2.png">

    <div class="photo">
        <img id="photo">
    </div>

    <div class="text">
        <div class="logo" id="logoBox" style="display:none;">
            <img id="logoImg">
        </div>
        <div class="details">
            <div class="name" id="name"></div>
            <div class="title" id="title"></div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="box">
        <h3 style="margin-top:0; margin-bottom:8px;">LinkedIn Profiles</h3>
        <p class="tag-reminder">
            Please ensure all handles are accurately tagged to maximize post engagement and reach.
        </p>
        <div id="links"></div>
    </div>

    <div class="box">
        <textarea id="caption" readonly></textarea>
    </div>

    <button onclick="copy()">Copy Caption</button>
    <button onclick="openLI()">Copy + Open LinkedIn</button>
    <button onclick="download()">Download Image</button>
</div>

<script>
// Unicode Bold Converter
function makeBold(text) {
    const chars = {
        'a': '𝐚', 'b': '𝐛', 'c': '𝐜', 'd': '𝐝', 'e': '𝐞', 'f': '𝐟', 'g': '𝐠', 'h': '𝐡', 'i': '𝐢', 'j': '𝐣', 'k': '𝐤', 'l': '𝐥', 'm': '𝐦',
        'n': '𝐧', 'o': '𝐨', 'p': '𝐩', 'q': '𝐪', 'r': '𝐫', 's': '𝐬', 't': '𝐭', 'u': '𝐮', 'v': '𝐯', 'w': '𝐰', 'x': '𝐱', 'y': '𝐲', 'z': '𝐳',
        'A': '𝐀', 'B': '𝐁', 'C': '𝐂', 'D': '𝐃', 'E': '𝐄', 'F': '𝐅', 'G': '𝐆', 'H': '𝐇', 'I': '𝐈', 'J': '𝐉', 'K': '𝐊', 'L': '𝐋', 'M': '𝐌',
        'N': '𝐍', 'O': '𝐎', 'P': '𝐏', 'Q': '𝐐', 'R': '𝐑', 'S': '𝐒', 'T': '𝐓', 'U': '𝐔', 'V': '𝐕', 'W': '𝐖', 'X': '𝐗', 'Y': '𝐘', 'Z': '𝐙',
        '0': '𝟎', '1': '𝟏', '2': '𝟐', '3': '𝟑', '4': '𝟒', '5': '𝟓', '6': '𝟔', '7': '𝟕', '8': '𝟖', '9': '𝟗'
    };
    return text.split('').map(c => chars[c] || c).join('');
}

function getData(){
    const raw = new URLSearchParams(window.location.search).get("data");
    return raw ? JSON.parse(decodeURIComponent(raw)) : null;
}

window.onload = () => {
    const d = getData();
    if(!d) return;

    document.getElementById('name').textContent = d.name;
    document.getElementById('title').textContent = d.job + " · " + d.company;
    document.getElementById('photo').src = d.photo;

    // Process bold text in caption
    let processedCaption = d.caption.replace(/\*\?(.*?)\*\*/g, (match, p1) => {
        return makeBold(p1);
    });
    document.getElementById('caption').value = processedCaption;

    if(d.logo){
        document.getElementById('logoImg').src = d.logo;
        document.getElementById('logoBox').style.display = "flex";
    }

    const box = document.getElementById('links');
    d.links.forEach(l => {
        const container = document.createElement('a');
        container.href = l.url;
        container.target = "_blank";
        container.className = "link-item";
        
        container.innerHTML = `
            <span class="link-name">${l.name}</span>
            <span class="link-url">${l.url}</span>
        `;
        box.appendChild(container);
    });
}

function copy(){
    navigator.clipboard.writeText(document.getElementById('caption').value);
}

function openLI(){
    copy();
    window.open("https://www.linkedin.com/feed/", "_blank");
}

async function download(){
    const card = document.getElementById('card');
    const canvas = await html2canvas(card, {
        scale: 2,
        useCORS: true,
        backgroundColor: null
    });

    const link = document.createElement('a');
    link.download = `Speaker-${document.getElementById('name').textContent}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
